<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2a6c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="UMP POPB" />
  <meta name="application-name" content="UMP POPB" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/assets/img/logo.png" />
  <link rel="apple-touch-icon" href="/assets/img/192-maskable.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/assets/img/512-maskable.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <title>Avisos — UMP POPB</title>
  <link rel="stylesheet" href="../assets/css/main.css?v=9" />
  <link rel="stylesheet" href="../assets/css/components.css?v=9" />
  <link rel="stylesheet" href="../assets/css/layout.v2.css?v=9" />
  <style>
    /* ── Aniversário da Sociedade ── */
    .anniversary-banner {
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.1rem;
      color: #fff;
      margin-bottom: .5rem;
    }
    .anniversary-banner.blue  { background: linear-gradient(135deg, #1a2a6c, #2a3f9f); }
    .anniversary-banner.green { background: linear-gradient(135deg, #1a5c2a, #2d8a40); }
    .anniversary-banner-icon  { font-size: 2rem; flex-shrink: 0; line-height: 1; }
    .anniversary-banner-title { font-size: 1rem; font-weight: 700; margin-bottom: .2rem; }
    .anniversary-banner-sub   { font-size: .8rem; opacity: .82; }

    /* ── Cards de aniversariante ── */
    .bday-card {
      background: #fff;
      border: 1.5px solid var(--slate-100);
      border-radius: var(--radius-lg);
      padding: .9rem 1.1rem;
      display: flex;
      align-items: center;
      gap: .9rem;
      transition: box-shadow .15s;
    }
    .bday-card:hover { box-shadow: var(--shadow); }
    .bday-card.today {
      border-color: var(--brand-orange, #e8630a);
      background: linear-gradient(135deg, #fffaf6, #fff);
    }
    .bday-card.passed { opacity: .45; }

    .bday-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--blue-100);
      color: var(--blue-700);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 700;
      flex-shrink: 0;
    }
    .bday-card.today .bday-avatar {
      background: linear-gradient(135deg, #e8630a, #c0392b);
      color: #fff;
      font-size: 1.3rem;
    }
    .bday-name   { font-weight: 600; color: var(--slate-800); font-size: .9rem; }
    .bday-sub    { font-size: .76rem; color: var(--slate-500); margin-top: .12rem; }
    .bday-pill   {
      margin-left: auto;
      flex-shrink: 0;
      font-size: .7rem;
      font-weight: 600;
      padding: .25rem .7rem;
      border-radius: 99px;
    }
    .bday-pill.today   { background: #fff3e0; color: #e8630a; border: 1px solid #ffd699; }
    .bday-pill.future  { background: var(--blue-50); color: var(--blue-700); border: 1px solid var(--blue-100); }
    .bday-pill.passed  { background: var(--slate-100); color: var(--slate-500); }

    /* ── Cards de avisos ── */
    .notice-item {
      background: #fff;
      border: 1.5px solid var(--slate-100);
      border-left: 4px solid var(--brand-blue, #1a2a6c);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      transition: box-shadow .15s;
    }
    .notice-item:hover { box-shadow: var(--shadow); }
    .notice-item.inactive { opacity: .45; border-left-color: var(--slate-300); }
    .notice-item-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: .75rem;
      margin-bottom: .5rem;
    }
    .notice-item-title { font-weight: 600; color: var(--slate-800); font-size: .9rem; line-height: 1.35; }
    .notice-item-meta  {
      display: flex; align-items: center; gap: .5rem; margin-top: .3rem; flex-wrap: wrap;
    }
    .notice-item-meta span { font-size: .7rem; color: var(--slate-400); }
    .notice-item-content {
      font-size: .85rem; color: var(--slate-600);
      line-height: 1.65; white-space: pre-wrap;
      padding-top: .5rem;
      border-top: 1px solid var(--slate-100);
      margin-top: .5rem;
    }
    .notice-item-actions { display: flex; gap: .25rem; flex-shrink: 0; }

    /* ── Section headers ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .75rem;
    }
    .section-label {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--slate-400);
    }

    /* ── Empty state ── */
    .empty-box {
      background: var(--slate-50);
      border: 1.5px dashed var(--slate-200);
      border-radius: var(--radius-lg);
      padding: 2rem 1rem;
      text-align: center;
      color: var(--slate-400);
      font-size: .85rem;
    }
    .empty-box .ei { font-size: 1.8rem; margin-bottom: .4rem; }

    .stack { display: flex; flex-direction: column; gap: .6rem; }
    .mb-6 { margin-bottom: 1.75rem; }
  </style>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="/assets/img/logo.png" class="sidebar-brand-logo" alt="Logo UMP" onerror="this.style.display='none'" />
      <div class="sidebar-brand-text">
        <h1>GESTÃO FPOPB</h1>
        <p>Plataforma de Gestão</p>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">v1.0.0</div>
  </aside>

  <div class="main-area">
    <header class="header">
      <div class="header-left">
        <button class="btn-menu" id="btn-menu">☰</button>
        <div class="header-org">
          <span class="header-org-name" id="header-org-name"></span>
        </div>
      </div>
      <div class="header-right">
        <div class="header-user">
          <div class="header-user-name" id="header-name"></div>
          <div class="header-user-role" id="header-role"></div>
        </div>
        <div class="header-avatar" id="header-avatar"></div>
        <button class="btn-logout" id="btn-logout" title="Sair"><img src="/assets/img/sair.png" alt="Sair" style="width:20px;height:20px;display:block" /></button>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-header-info">
          <h1>Avisos</h1>
          <p id="notices-subtitle" style="color:var(--slate-500);font-size:.875rem"></p>
        </div>
      </div>

      <div id="page-alert" class="hidden"></div>

      <!-- ── FEDERAÇÃO ── -->
      <div id="fed-section" style="display:none">

        <!-- Aniversários das locais -->
        <div id="fed-anniversaries" class="mb-6"></div>

        <!-- Avisos enviados -->
        <div>
          <div class="section-header">
            <span class="section-label">Avisos Enviados às Locais</span>
            <button class="btn btn-primary btn-sm" id="btn-new-notice">+ Novo aviso</button>
          </div>
          <div id="sent-notices-list">
            <div class="loading-center"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- ── UMP LOCAL ── -->
      <div id="local-section" style="display:none">

        <!-- Aniversário da sociedade -->
        <div id="local-anniversary" style="display:none" class="mb-6"></div>

        <!-- Aniversariantes -->
        <div class="mb-6">
          <div class="section-header">
            <span class="section-label" id="birthdays-section-label">Aniversariantes do Mês</span>
          </div>
          <div id="birthdays-loading" class="loading-center"><div class="spinner"></div></div>
          <div id="birthdays-list" class="stack" style="display:none"></div>
          <div id="birthdays-empty" class="empty-box" style="display:none">
            <div class="ei">🎈</div>
            <p>Nenhum aniversariante este mês.</p>
            <p style="font-size:.75rem;margin-top:.25rem">Cadastre as datas de nascimento dos sócios.</p>
          </div>
        </div>

        <!-- Avisos da federação -->
        <div>
          <div class="section-header">
            <span class="section-label">Avisos da Federação</span>
          </div>
          <div id="received-notices-list">
            <div class="loading-center"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

    </main>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
</div>

<!-- Modal novo aviso -->
<div class="modal-overlay" id="modal-new-notice">
  <div class="modal">
    <div class="modal-header">
      <h2>Novo Aviso</h2>
      <button class="modal-close">✕</button>
    </div>
    <div class="field mb-4">
      <label>Título</label>
      <input class="input" type="text" id="notice-title-input" placeholder="Título do aviso" maxlength="200" />
    </div>
    <div class="field mb-4">
      <label>Conteúdo</label>
      <textarea class="input" id="notice-content-input" rows="5"
        placeholder="Escreva o conteúdo do aviso..."
        style="resize:vertical;min-height:120px"></textarea>
    </div>
    <div class="field mb-4">
      <label>Destinatário</label>
      <select class="input" id="notice-target-type">
        <option value="all">📢 Todas as Locais</option>
        <option value="specific">📍 Uma local específica</option>
      </select>
    </div>
    <div class="field mb-4" id="notice-target-local-wrap" style="display:none">
      <label>Selecione a Local</label>
      <select class="input" id="notice-target-local">
        <option value="">Selecione...</option>
      </select>
    </div>
    <div class="field mb-4">
      <label>Data de expiração <span style="font-weight:400;color:var(--slate-400)">(opcional)</span></label>
      <input class="input" type="date" id="notice-expires" />
    </div>
    <div id="notice-alert" class="hidden mb-4"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary modal-close">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-notice">Enviar Aviso</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, isLocalUmp, isFederation } from '../assets/js/auth.js'
  import { renderShell, renderBottomNav } from '../assets/js/router.v3.js'
  import { api } from '../assets/js/api.js'
  import { formatDate, openModal, closeModal, initModalClose, showAlert, clearAlert, setLoading } from '../assets/js/utils.js'

  if (!requireAuth()) throw new Error()
  renderShell()
  renderBottomNav('notices')
  document.querySelector('[data-page="notices"]')?.classList.add('active')
  initModalClose()

  const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                       'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
  const today        = new Date()
  const currentMonth = today.getMonth()
  const currentDay   = today.getDate()
  const currentYear  = today.getFullYear()

  document.getElementById('notices-subtitle').textContent =
    `Avisos de ${MONTH_NAMES[currentMonth]} de ${currentYear}`

  // ── FEDERAÇÃO ────────────────────────────────────────────
  if (isFederation()) {
    document.getElementById('fed-section').style.display = 'block'
    loadFedData()
  }

  // ── UMP LOCAL ────────────────────────────────────────────
  if (isLocalUmp()) {
    document.getElementById('local-section').style.display = 'block'
    loadLocalData()
  }

  // ════════════════════════════════════════
  // FEDERAÇÃO
  // ════════════════════════════════════════

  let localsList = []

  async function loadFedData() {
    try {
      const anniversaries = await api.get('/api/local-umps/anniversaries')
      renderAnniversaries(anniversaries)
    } catch {}

    await loadSentNotices()

    try {
      localsList = await api.get('/api/federations/me/local-umps')
      const select = document.getElementById('notice-target-local')
      localsList.forEach(l => {
        const opt = document.createElement('option')
        opt.value = l.id
        opt.textContent = l.name
        select.appendChild(opt)
      })
    } catch {}
  }

  function renderAnniversaries(anniversaries) {
    const section = document.getElementById('fed-anniversaries')
    if (!anniversaries.length) {
      section.innerHTML = `
        <div class="section-header"><span class="section-label">Aniversários de Locais este Mês</span></div>
        <div class="empty-box"><div class="ei">🏛️</div><p>Nenhuma local faz aniversário este mês.</p></div>`
      return
    }
    section.innerHTML = `
      <div class="section-header"><span class="section-label">Aniversários de Locais este Mês</span></div>
      <div class="stack">
        ${anniversaries.map(a => `
          <div class="bday-card ${a.is_today ? 'today' : ''} ${a.already_passed && !a.is_today ? 'passed' : ''}">
            <div class="bday-avatar">${a.is_today ? '🎉' : '🏛️'}</div>
            <div style="flex:1;min-width:0">
              <div class="bday-name">${a.name}</div>
              <div class="bday-sub">
                ${a.church_name ? a.church_name + ' · ' : ''}
                ${a.is_today ? `Hoje! ${a.years} anos!`
                  : a.already_passed ? `Dia ${a.org_day} — ${a.years} anos (passou)`
                  : `Dia ${a.org_day} de ${MONTH_NAMES[currentMonth]} — ${a.years} anos`}
              </div>
            </div>
            <span class="bday-pill ${a.is_today ? 'today' : a.already_passed ? 'passed' : 'future'}">
              ${a.is_today ? '🎉 Hoje' : a.already_passed ? 'Passou' : `Dia ${a.org_day}`}
            </span>
          </div>
        `).join('')}
      </div>`
  }

  async function loadSentNotices() {
    try {
      const notices = await api.get('/api/notices/sent')
      renderSentNotices(notices)
    } catch {}
  }

  function renderSentNotices(notices) {
    const container = document.getElementById('sent-notices-list')
    if (!notices.length) {
      container.innerHTML = `<div class="empty-box"><div class="ei">📭</div><p>Nenhum aviso enviado ainda.</p></div>`
      return
    }
    container.innerHTML = `<div class="stack">${notices.map(n => `
      <div class="notice-item ${!n.is_active ? 'inactive' : ''}">
        <div class="notice-item-header">
          <div style="flex:1;min-width:0">
            <div class="notice-item-title">${n.title}</div>
            <div class="notice-item-meta">
              <span class="badge ${n.target_type === 'all' ? 'badge-blue' : 'badge-slate'}" style="font-size:.68rem">
                ${n.target_type === 'all' ? '📢 Todas as Locais' : `📍 ${n.target_local_name || 'Local específica'}`}
              </span>
              <span>${formatDate(n.created_at?.split('T')[0])}</span>
              ${n.expires_at ? `<span style="color:var(--amber-700)">Expira ${formatDate(n.expires_at?.split('T')[0])}</span>` : ''}
              ${!n.is_active ? '<span style="color:var(--red-600)">Desativado</span>' : ''}
            </div>
          </div>
          <div class="notice-item-actions">
            <button class="btn btn-ghost btn-icon" onclick="toggleNotice('${n.id}', ${n.is_active})" title="${n.is_active ? 'Desativar' : 'Ativar'}" style="font-size:.9rem">
              ${n.is_active ? '👁️' : '🚫'}
            </button>
            <button class="btn btn-ghost btn-icon danger" onclick="deleteNotice('${n.id}')" title="Excluir">✕</button>
          </div>
        </div>
        <div class="notice-item-content">${n.content}</div>
      </div>
    `).join('')}</div>`
  }

  window.toggleNotice = async (id, currentActive) => {
    try {
      await api.put(`/api/notices/${id}`, { is_active: !currentActive })
      await loadSentNotices()
    } catch(err) { alert(err.message) }
  }

  window.deleteNotice = async (id) => {
    if (!confirm('Excluir este aviso?')) return
    try {
      await api.delete(`/api/notices/${id}`)
      await loadSentNotices()
    } catch(err) { alert(err.message) }
  }

  document.getElementById('btn-new-notice')?.addEventListener('click', () => {
    document.getElementById('notice-title-input').value   = ''
    document.getElementById('notice-content-input').value = ''
    document.getElementById('notice-target-type').value   = 'all'
    document.getElementById('notice-target-local-wrap').style.display = 'none'
    document.getElementById('notice-expires').value       = ''
    clearAlert('notice-alert')
    openModal('modal-new-notice')
  })

  document.getElementById('notice-target-type')?.addEventListener('change', (e) => {
    document.getElementById('notice-target-local-wrap').style.display =
      e.target.value === 'specific' ? 'block' : 'none'
  })

  document.getElementById('btn-save-notice')?.addEventListener('click', async () => {
    const btn       = document.getElementById('btn-save-notice')
    const title     = document.getElementById('notice-title-input').value.trim()
    const content   = document.getElementById('notice-content-input').value.trim()
    const targetType = document.getElementById('notice-target-type').value
    const targetLocalId = document.getElementById('notice-target-local').value
    const expiresAt = document.getElementById('notice-expires').value

    if (!title || !content) {
      showAlert('notice-alert', 'Preencha título e conteúdo.', 'error'); return
    }

    setLoading(btn, true, 'Enviar')
    try {
      await api.post('/api/notices/', {
        title,
        content,
        target_type: targetType,
        target_local_id: targetType === 'specific' ? targetLocalId : null,
        expires_at: expiresAt ? new Date(expiresAt).toISOString() : null,
      })
      closeModal('modal-new-notice')
      await loadSentNotices()
    } catch(err) {
      showAlert('notice-alert', err.message, 'error')
    } finally {
      setLoading(btn, false, 'Enviar')
    }
  })

  // ════════════════════════════════════════
  // UMP LOCAL
  // ════════════════════════════════════════

  async function loadLocalData() {
    await checkSocietyAnniversary()

    try {
      const birthdays = await api.get('/api/members/birthdays')
      renderBirthdays(birthdays)
    } catch {
      document.getElementById('birthdays-loading').style.display = 'none'
    }

    await loadReceivedNotices()
  }

  async function checkSocietyAnniversary() {
    try {
      const orgData = await api.get('/api/local-umps/me')
      if (!orgData.organization_date) return
      const orgDate = new Date(orgData.organization_date + 'T00:00:00')
      if (orgDate.getMonth() !== currentMonth) return
      const years   = currentYear - orgDate.getFullYear()
      const isToday = orgDate.getDate() === currentDay
      const section = document.getElementById('local-anniversary')
      section.style.display = 'block'
      section.innerHTML = `
        <div class="section-header"><span class="section-label">Aniversário da Sociedade</span></div>
        <div class="anniversary-banner ${isToday ? 'blue' : 'green'}">
          <div class="anniversary-banner-icon">${isToday ? '🎉' : '🏛️'}</div>
          <div>
            <div class="anniversary-banner-title">
              ${isToday ? `Hoje é o aniversário de ${orgData.name}!` : `${orgData.name} faz aniversário este mês!`}
            </div>
            <div class="anniversary-banner-sub">
              ${isToday
                ? `Completando ${years} anos de história! 🎊`
                : `Dia ${orgDate.getDate()} de ${MONTH_NAMES[currentMonth]} — ${years} anos`}
            </div>
          </div>
        </div>`
    } catch {}
  }

  function renderBirthdays(birthdays) {
    const loading = document.getElementById('birthdays-loading')
    const list    = document.getElementById('birthdays-list')
    const empty   = document.getElementById('birthdays-empty')
    loading.style.display = 'none'

    if (!birthdays.length) { empty.style.display = 'block'; return }

    list.style.display = 'flex'
    list.innerHTML = birthdays.map(b => {
      const initials = b.full_name.split(' ').slice(0, 2).map(n => n[0]).join('').toUpperCase()
      return `
        <div class="bday-card ${b.is_today ? 'today' : ''} ${b.already_passed && !b.is_today ? 'passed' : ''}">
          <div class="bday-avatar">${b.is_today ? '🎂' : initials}</div>
          <div style="flex:1;min-width:0">
            <div class="bday-name">${b.full_name}</div>
            <div class="bday-sub">
              ${b.is_today
                ? `🎉 Hoje! Completando ${b.age} anos`
                : b.already_passed
                  ? `Dia ${b.birth_day} — ${b.age} anos (passou)`
                  : `Dia ${b.birth_day} de ${MONTH_NAMES[currentMonth]} — ${b.age} anos`}
            </div>
          </div>
          <span class="bday-pill ${b.is_today ? 'today' : b.already_passed ? 'passed' : 'future'}">
            ${b.is_today ? '🎉 Hoje' : b.already_passed ? 'Passou' : `Dia ${b.birth_day}`}
          </span>
        </div>`
    }).join('')
  }

  async function loadReceivedNotices() {
    try {
      const notices   = await api.get('/api/notices/received')
      const container = document.getElementById('received-notices-list')

      if (!notices.length) {
        container.innerHTML = `<div class="empty-box"><div class="ei">📭</div><p>Nenhum aviso da Federação no momento.</p></div>`
        return
      }

      container.innerHTML = `<div class="stack">${notices.map(n => `
        <div class="notice-item">
          <div class="notice-item-header">
            <div style="flex:1;min-width:0">
              <div class="notice-item-title">${n.title}</div>
              <div class="notice-item-meta">
                <span>📨 Federação · ${formatDate(n.created_at?.split('T')[0])}</span>
                ${n.target_type === 'specific' ? '<span class="badge badge-blue" style="font-size:.65rem">Direcionado para você</span>' : ''}
              </div>
            </div>
          </div>
          <div class="notice-item-content">${n.content}</div>
        </div>
      `).join('')}</div>`
    } catch {}
  }
</script>

<script>
  if ('serviceWorker' in navigator) {
    // Remove todos os SWs antigos primeiro
    navigator.serviceWorker.getRegistrations().then(regs => {
      return Promise.all(regs.map(r => r.unregister()))
    }).then(() => {
      return navigator.serviceWorker.register('/sw.js?v=8')
    }).then(reg => {
      console.log('SW registrado:', reg.scope)
    }).catch(err => console.error('SW erro:', err))
  }
