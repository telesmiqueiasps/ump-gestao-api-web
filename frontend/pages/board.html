<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2a6c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="UMP POPB" />
  <meta name="application-name" content="UMP POPB" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/assets/img/logo.png" />
  <link rel="apple-touch-icon" href="/assets/img/192-maskable.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/assets/img/512-maskable.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <title>Diretoria — UMP POPB</title>
  <link rel="stylesheet" href="../assets/css/main.css?v=9" />
  <link rel="stylesheet" href="../assets/css/components.css?v=9" />
  <link rel="stylesheet" href="../assets/css/layout.v2.css?v=9" />
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="/assets/img/logo.png" class="sidebar-brand-logo" alt="Logo UMP" onerror="this.style.display='none'" />
      <div class="sidebar-brand-text">
        <h1>UMP POPB</h1>
        <p>Plataforma de Gestão</p>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">v1.0.0</div>
  </aside>

  <div class="main-area">
    <header class="header">
      <div class="header-left">
        <button class="btn-menu" id="btn-menu">☰</button>
        <div class="header-org">
          <span class="header-org-name" id="header-org-name"></span>
        </div>
      </div>
      <div class="header-right">
        <div class="header-user">
          <div class="header-user-name" id="header-name"></div>
          <div class="header-user-role" id="header-role"></div>
        </div>
        <div class="header-avatar" id="header-avatar"></div>
        <button class="btn-logout" id="btn-logout" title="Sair"><img src="/assets/img/sair.png" alt="Sair" style="width:20px;height:20px;display:block" /></button>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-header-info">
          <h1>Diretoria</h1>
          <p>Composição da diretoria por ano de mandato</p>
        </div>
        <div class="flex gap-3 items-center">
          <select class="input" id="year-select" style="width:auto"></select>
          <button class="btn btn-primary" id="btn-new-board">+ Adicionar membro</button>
        </div>
      </div>

      <div id="page-alert" class="hidden"></div>

      <div class="board-grid" id="board-grid">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>

      <!-- Seção de usuários — só para presidente/vice da federação -->
      <div id="users-section" style="display:none">
        <div class="page-header mt-6">
          <div class="page-header-info">
            <h2>Usuários do Sistema</h2>
            <p>Gerencie os acessos da Federação</p>
          </div>
          <button class="btn btn-primary" id="btn-new-fed-user">+ Novo usuário</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Cargo</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="fed-users-body">
              <tr><td colspan="5" class="table-empty">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-board">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 id="modal-board-title">Adicionar Membro</h2>
      <button class="modal-close">✕</button>
    </div>
    <div class="field mb-4">
      <label>Nome</label>
      <input class="input" type="text" id="b-name" placeholder="Nome completo" />
    </div>
    <div class="field mb-4">
      <label>Cargo</label>
      <select class="input" id="b-role"></select>
    </div>
    <div class="field mb-4">
      <label>Ano de mandato</label>
      <input class="input" type="number" id="b-year" />
    </div>
    <div class="field mb-4">
      <label>Contato <span style="font-weight:400;color:var(--slate-400);font-size:.75rem">(opcional)</span></label>
      <input class="input" type="tel" id="b-contact" placeholder="(83) 99999-9999" maxlength="15" />
    </div>
    <div id="board-alert" class="hidden mb-4"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary modal-close">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-board">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal Usuário da Federação -->
<div class="modal-overlay" id="modal-fed-user">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2>Novo Usuário</h2>
      <button class="modal-close">✕</button>
    </div>
    <div class="field mb-4">
      <label>Nome completo</label>
      <input class="input" type="text" id="fu-full-name" placeholder="Nome completo" />
    </div>
    <div class="field mb-4">
      <label>E-mail</label>
      <input class="input" type="email" id="fu-email" placeholder="email@exemplo.com" />
    </div>
    <div class="field mb-4">
      <label>Senha</label>
      <input class="input" type="password" id="fu-password" placeholder="Mínimo 6 caracteres" />
    </div>
    <div class="field mb-4">
      <label>Cargo</label>
      <select class="input" id="fu-role">
        <option value="">Selecione o cargo…</option>
        <option value="presidente">Presidente</option>
        <option value="vice_presidente">Vice-Presidente</option>
        <option value="1_secretario">1º Secretário</option>
        <option value="2_secretario">2º Secretário</option>
        <option value="tesoureiro">Tesoureiro</option>
        <option value="secretario_executivo">Secretário Executivo</option>
        <option value="secretario_presbiterial">Secretário Presbiterial</option>
      </select>
    </div>
    <div id="fed-user-alert" class="hidden mb-4"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary modal-close">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-fed-user">Criar usuário</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, isFederation, isLocalUmp, hasRole, getUser } from '../assets/js/auth.js?v=9'
  import { renderShell, canAccessPage, renderBottomNav } from '../assets/js/router.v3.js?v=9'
  import { api } from '../assets/js/api.js?v=9'
  import { showAlert, clearAlert, openModal, closeModal, initModalClose, setLoading } from '../assets/js/utils.js?v=9'

  (async () => {
    if (!requireAuth()) throw new Error()
    if (!canAccessPage('board')) window.location.href = '/pages/dashboard.html'
    await renderShell()
    renderBottomNav('board')
    document.querySelector('[data-page="board"]')?.classList.add('active')
  initModalClose()

  const ROLE_LABELS = {
    presidente:              'Presidente',
    vice_presidente:         'Vice-Presidente',
    '1_secretario':          '1º Secretário',
    '2_secretario':          '2º Secretário',
    tesoureiro:              'Tesoureiro',
    secretario_executivo:    'Secretário Executivo',
    secretario_presbiterial: 'Secretário Presbiterial',
    conselheiro:             'Conselheiro',
  }

  if (isFederation() && hasRole('presidente', 'vice_presidente')) {
    document.getElementById('users-section').style.display = 'block'
    loadFedUsers()
  }

  const ALL_ROLES = [
    { value: 'presidente',              label: 'Presidente' },
    { value: 'vice_presidente',         label: 'Vice-Presidente' },
    { value: '1_secretario',            label: '1º Secretário' },
    { value: '2_secretario',            label: '2º Secretário' },
    { value: 'tesoureiro',              label: 'Tesoureiro' },
    { value: 'secretario_executivo',    label: 'Secretário Executivo',    fedOnly: true },
    { value: 'secretario_presbiterial', label: 'Secretário Presbiterial', fedOnly: true },
    { value: 'conselheiro',             label: 'Conselheiro',             localOnly: true },
  ]

  const availableRoles = ALL_ROLES.filter(r => {
    if (r.fedOnly   && !isFederation()) return false
    if (r.localOnly && !isLocalUmp())   return false
    return true
  })

  const roleSelect = document.getElementById('b-role')
  availableRoles.forEach(r => {
    const opt = document.createElement('option')
    opt.value = r.value; opt.textContent = r.label
    roleSelect.appendChild(opt)
  })

  const getRoleLabel = (val) => ALL_ROLES.find(r => r.value === val)?.label ?? val

  let currentYear = new Date().getFullYear()
  let editId = null

  const yearSelect = document.getElementById('year-select')
  ;[2023,2024,2025,2026].forEach(y => {
    const opt = document.createElement('option')
    opt.value = y; opt.textContent = y
    if (y === currentYear) opt.selected = true
    yearSelect.appendChild(opt)
  })
  yearSelect.addEventListener('change', () => { currentYear = Number(yearSelect.value); loadBoard() })

  async function loadBoard() {
    const grid = document.getElementById('board-grid')
    grid.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>'
    try {
      const data = await api.get(`/api/board/?fiscal_year=${currentYear}`)
      if (!data.length) {
        grid.innerHTML = `<div class="card" style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--slate-400)">Nenhum membro cadastrado para ${currentYear}.</div>`
        return
      }
      grid.innerHTML = data.map(b => `
        <div class="board-card">
          <div class="board-card-name">${b.member_name}</div>
          <div class="board-card-role"><span class="badge badge-blue">${getRoleLabel(b.role)}</span></div>
          <div class="board-card-year">Mandato ${b.fiscal_year}</div>
          ${b.contact ? `<div class="board-card-contact" style="font-size:.75rem;color:var(--slate-500);margin-top:.2rem">📞 ${b.contact}</div>` : ''}
          <div class="board-card-actions">
            <button class="btn btn-secondary btn-sm" onclick="editBoard('${b.id}','${b.member_name}','${b.role}',${b.fiscal_year},'${b.contact ?? ''}')">✎ Editar</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--red-600)" onclick="removeBoard('${b.id}','${b.member_name}')">✕</button>
          </div>
        </div>
      `).join('')
    } catch(err) {
      showAlert('page-alert', err.message, 'error')
    }
  }

  document.getElementById('btn-new-board').addEventListener('click', () => {
    editId = null
    document.getElementById('modal-board-title').textContent = 'Adicionar Membro'
    document.getElementById('b-name').value = ''
    document.getElementById('b-role').value = availableRoles[0]?.value ?? ''
    document.getElementById('b-year').value = currentYear
    document.getElementById('b-contact').value = ''
    clearAlert('board-alert')
    openModal('modal-board')
  })

  window.editBoard = (id, name, role, year, contact) => {
    editId = id
    document.getElementById('modal-board-title').textContent = 'Editar Membro'
    document.getElementById('b-name').value = name
    document.getElementById('b-role').value = role
    document.getElementById('b-year').value = year
    document.getElementById('b-contact').value = contact ?? ''
    clearAlert('board-alert')
    openModal('modal-board')
  }

  document.getElementById('b-contact').addEventListener('input', (e) => {
    let v = e.target.value.replace(/\D/g, '')
    if (v.length > 11) v = v.slice(0, 11)
    if (v.length <= 10) {
      v = v.replace(/(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3')
    } else {
      v = v.replace(/(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3')
    }
    e.target.value = v.replace(/-$/, '')
  })

  document.getElementById('btn-save-board').addEventListener('click', async () => {
    const btn  = document.getElementById('btn-save-board')
    const name = document.getElementById('b-name').value.trim()
    if (!name) { showAlert('board-alert', 'Informe o nome do membro.', 'error'); return }

    const payload = {
      member_name: name,
      role:        document.getElementById('b-role').value,
      fiscal_year: Number(document.getElementById('b-year').value),
      contact:     document.getElementById('b-contact').value || null,
    }

    setLoading(btn, true, 'Salvar')
    try {
      if (editId) await api.put(`/api/board/${editId}`, payload)
      else        await api.post('/api/board/', payload)
      closeModal('modal-board')
      loadBoard()
    } catch(err) {
      showAlert('board-alert', err.message, 'error')
    } finally {
      setLoading(btn, false, 'Salvar')
    }
  })

  window.removeBoard = async (id, name) => {
    if (!confirm(`Remover ${name} da diretoria?`)) return
    try {
      await api.delete(`/api/board/${id}`)
      loadBoard()
    } catch(err) { showAlert('page-alert', err.message, 'error') }
  }

  // ── Usuários da Federação ────────────────────────────────────────────────────

  async function loadFedUsers() {
    const tbody = document.getElementById('fed-users-body')
    tbody.innerHTML = '<tr><td colspan="5" class="table-empty">Carregando...</td></tr>'
    try {
      const orgId = getUser().organization_id
      const users = await api.get(`/api/users/by-org/${orgId}`)
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="table-empty">Nenhum usuário cadastrado.</td></tr>'
        return
      }
      tbody.innerHTML = users.map(u => `
        <tr>
          <td>${u.full_name}</td>
          <td>${u.email}</td>
          <td><span class="badge badge-blue">${ROLE_LABELS[u.role] ?? u.role}</span></td>
          <td><span class="badge ${u.is_active ? 'badge-green' : 'badge-slate'}">${u.is_active ? 'Ativo' : 'Inativo'}</span></td>
          <td>
            ${u.is_active ? `<button class="btn btn-ghost btn-sm" style="color:var(--red-600)" onclick="deactivateFedUser('${u.id}','${u.full_name.replace(/'/g, "\\'")}')">Desativar</button>` : ''}
          </td>
        </tr>
      `).join('')
    } catch(err) {
      document.getElementById('fed-users-body').innerHTML =
        `<tr><td colspan="5" class="table-empty" style="color:var(--red-600)">${err.message}</td></tr>`
    }
  }

  document.getElementById('btn-new-fed-user')?.addEventListener('click', () => {
    document.getElementById('fu-full-name').value = ''
    document.getElementById('fu-email').value     = ''
    document.getElementById('fu-password').value  = ''
    document.getElementById('fu-role').value      = ''
    clearAlert('fed-user-alert')
    openModal('modal-fed-user')
  })

  document.getElementById('btn-save-fed-user')?.addEventListener('click', async () => {
    const btn      = document.getElementById('btn-save-fed-user')
    const fullName = document.getElementById('fu-full-name').value.trim()
    const email    = document.getElementById('fu-email').value.trim()
    const password = document.getElementById('fu-password').value
    const role     = document.getElementById('fu-role').value

    if (!fullName)           { showAlert('fed-user-alert', 'Informe o nome completo.', 'error'); return }
    if (!email)              { showAlert('fed-user-alert', 'Informe o e-mail.', 'error'); return }
    if (password.length < 6) { showAlert('fed-user-alert', 'A senha deve ter no mínimo 6 caracteres.', 'error'); return }
    if (!role)               { showAlert('fed-user-alert', 'Selecione o cargo.', 'error'); return }

    setLoading(btn, true, 'Criar usuário')
    try {
      await api.post('/api/users/', {
        full_name:         fullName,
        email,
        password,
        role,
        organization_id:   getUser().organization_id,
        organization_type: 'federation',
      })
      closeModal('modal-fed-user')
      loadFedUsers()
    } catch(err) {
      showAlert('fed-user-alert', err.message, 'error')
    } finally {
      setLoading(btn, false, 'Criar usuário')
    }
  })

  window.deactivateFedUser = async (id, name) => {
    if (!confirm(`Desativar o usuário "${name}"?`)) return
    try {
      await api.delete(`/api/users/${id}`)
      loadFedUsers()
    } catch(err) { showAlert('page-alert', err.message, 'error') }
  }

  loadBoard()
  })()
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(registrations => {
      // Remove todos os SW antigos primeiro
      registrations.forEach(reg => reg.unregister())
    }).then(() => {
      // Registra o novo SW limpo
      navigator.serviceWorker.register('/sw.js?v=6').then(reg => {
        console.log('SW registrado:', reg.scope)
      }).catch(console.error)
    })
  }
</script>

</body>
</html>
