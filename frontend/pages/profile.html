<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a2a6c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Perfil — Gestão UMP</title>
  <link rel="icon" type="image/png" href="/assets/img/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/layout.v2.css" />
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="/assets/img/logo.png" class="sidebar-brand-logo" alt="Logo UMP" />
      <div class="sidebar-brand-text"><h1>UMP POPB</h1><p>Plataforma de Gestão</p></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">v1.0.0</div>
  </aside>

  <div class="main-area">
    <header class="header">
      <button class="btn-menu" id="btn-menu">☰</button>
      <div class="header-user">
        <div class="header-user-name" id="header-name"></div>
        <div class="header-user-role" id="header-role"></div>
      </div>
      <div class="header-avatar" id="header-avatar"></div>
      <button class="btn-logout" id="btn-logout" title="Sair">⏻</button>
    </header>

    <main class="page-content" style="max-width:680px">
      <div class="page-header">
        <div class="page-header-info">
          <h1>Perfil da Organização</h1>
          <p>Informações e identidade visual</p>
        </div>
      </div>

      <div id="page-alert" class="hidden"></div>

      <!-- Logo -->
      <div class="card">
        <h2 class="mb-4">Logo da Organização</h2>
        <div class="flex items-center gap-4" style="flex-wrap:wrap">
          <div id="logo-preview" style="
            width:80px;height:80px;
            border-radius:var(--radius-lg);
            border:2px solid var(--slate-200);
            background:var(--slate-50);
            display:flex;align-items:center;justify-content:center;
            font-size:1.8rem;font-weight:700;color:var(--slate-300);
            overflow:hidden;flex-shrink:0;
            box-shadow:var(--shadow-sm)
          ">?</div>
          <div style="flex:1;min-width:200px">
            <label class="btn btn-secondary" style="cursor:pointer;display:inline-flex;align-items:center;gap:.5rem">
              ↑ <span id="logo-btn-text">Enviar logo</span>
              <input type="file" id="logo-input" accept="image/png,image/jpeg,image/webp" style="display:none" />
            </label>
            <p class="text-xs text-slate-400" style="margin-top:.5rem">PNG, JPG ou WEBP · máx. 5MB</p>
            <p class="text-xs" id="logo-status" style="margin-top:.3rem"></p>
          </div>
        </div>
      </div>

      <!-- Dados -->
      <div class="card">
        <h2 class="mb-4" id="dados-title">Dados da Organização</h2>

        <!-- Campos Federação -->
        <div id="fed-fields">
          <div class="grid-2 mb-4">
            <div class="field">
              <label>Nome da Federação</label>
              <input class="input" type="text" id="org-name" />
            </div>
            <div class="field">
              <label>Presbitério</label>
              <input class="input" type="text" id="org-presbytery" />
            </div>
          </div>
          <div class="field mb-4">
            <label>Sinodal</label>
            <input class="input" type="text" id="org-synodal" placeholder="Ex: Sinodal Paraíba de Mocidades" />
          </div>
          <div class="field mb-4">
            <label>Cor Tema dos Relatórios</label>
            <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
              <input type="color" id="org-theme-color" value="#1a2a6c"
                style="width:48px;height:40px;border:1.5px solid var(--slate-300);border-radius:8px;cursor:pointer;padding:2px" />
              <div style="display:flex;gap:.5rem;flex-wrap:wrap" id="color-presets">
                <button type="button" class="color-preset" data-color="#1a2a6c"
                  style="width:32px;height:32px;border-radius:6px;border:2px solid transparent;background:#1a2a6c;cursor:pointer;transition:all .15s"
                  title="Azul Marinho (padrão)"></button>
                <button type="button" class="color-preset" data-color="#1a5c2a"
                  style="width:32px;height:32px;border-radius:6px;border:2px solid transparent;background:#1a5c2a;cursor:pointer;transition:all .15s"
                  title="Verde Escuro"></button>
                <button type="button" class="color-preset" data-color="#7b1fa2"
                  style="width:32px;height:32px;border-radius:6px;border:2px solid transparent;background:#7b1fa2;cursor:pointer;transition:all .15s"
                  title="Roxo"></button>
                <button type="button" class="color-preset" data-color="#b71c1c"
                  style="width:32px;height:32px;border-radius:6px;border:2px solid transparent;background:#b71c1c;cursor:pointer;transition:all .15s"
                  title="Vermelho Escuro"></button>
                <button type="button" class="color-preset" data-color="#e65100"
                  style="width:32px;height:32px;border-radius:6px;border:2px solid transparent;background:#e65100;cursor:pointer;transition:all .15s"
                  title="Laranja Escuro"></button>
                <button type="button" class="color-preset" data-color="#004d40"
                  style="width:32px;height:32px;border-radius:6px;border:2px solid transparent;background:#004d40;cursor:pointer;transition:all .15s"
                  title="Verde Teal"></button>
              </div>
            </div>
          </div>
        </div>

        <!-- Campos UMP Local -->
        <div id="local-fields" style="display:none">
          <div class="field mb-4">
            <label>Nome da UMP</label>
            <input class="input" type="text" id="local-name" />
          </div>
          <div class="grid-2 mb-4">
            <div class="field">
              <label>Federação / Presbitério</label>
              <input class="input" type="text" id="local-presbytery" readonly style="background:var(--slate-50);color:var(--slate-500)" />
            </div>
            <div class="field">
              <label>Igreja</label>
              <input class="input" type="text" id="local-church" />
            </div>
          </div>
          <div class="field mb-4">
            <label>Endereço</label>
            <input class="input" type="text" id="local-address" placeholder="Rua, número, bairro, cidade" />
          </div>
          <div class="grid-2 mb-4">
            <div class="field">
              <label>Nome do Pastor</label>
              <input class="input" type="text" id="local-pastor" />
            </div>
            <div class="field">
              <label>Contato do Pastor</label>
              <input class="input" type="text" id="local-pastor-contact" placeholder="(83) 99999-9999" />
            </div>
          </div>
          <div class="grid-2 mb-4">
            <div class="field">
              <label>Data de Organização</label>
              <input class="input" type="date" id="local-org-date" />
            </div>
            <div class="field">
              <label>Ano Vigente</label>
              <input class="input" type="text" id="local-year" readonly style="background:var(--slate-50);color:var(--slate-500)" />
            </div>
          </div>
          <div class="field mb-4">
            <label>Saldo Inicial do Ano</label>
            <input class="input" type="text" id="local-balance" readonly style="background:var(--slate-50);color:var(--slate-500)" />
          </div>
          <div class="field mb-4">
            <label>Cor Tema dos Relatórios</label>
            <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
              <input type="color" id="org-theme-color" value="#1a2a6c"
                style="width:48px;height:40px;border:1.5px solid var(--slate-300);border-radius:8px;cursor:pointer;padding:2px" />
              <div style="display:flex;gap:.5rem;flex-wrap:wrap" id="color-presets">
                <button type="button" class="color-preset" data-color="#1a2a6c"
                  style="width:32px;height:32px;border-radius:6px;border:2px solid transparent;background:#1a2a6c;cursor:pointer;transition:all .15s"
                  title="Azul Marinho (padrão)"></button>
                <button type="button" class="color-preset" data-color="#1a5c2a"
                  style="width:32px;height:32px;border-radius:6px;border:2px solid transparent;background:#1a5c2a;cursor:pointer;transition:all .15s"
                  title="Verde Escuro"></button>
                <button type="button" class="color-preset" data-color="#7b1fa2"
                  style="width:32px;height:32px;border-radius:6px;border:2px solid transparent;background:#7b1fa2;cursor:pointer;transition:all .15s"
                  title="Roxo"></button>
                <button type="button" class="color-preset" data-color="#b71c1c"
                  style="width:32px;height:32px;border-radius:6px;border:2px solid transparent;background:#b71c1c;cursor:pointer;transition:all .15s"
                  title="Vermelho Escuro"></button>
                <button type="button" class="color-preset" data-color="#e65100"
                  style="width:32px;height:32px;border-radius:6px;border:2px solid transparent;background:#e65100;cursor:pointer;transition:all .15s"
                  title="Laranja Escuro"></button>
                <button type="button" class="color-preset" data-color="#004d40"
                  style="width:32px;height:32px;border-radius:6px;border:2px solid transparent;background:#004d40;cursor:pointer;transition:all .15s"
                  title="Verde Teal"></button>
              </div>
            </div>
          </div>
        </div>

        <div id="profile-alert" class="hidden mb-4"></div>

        <div class="flex items-center gap-3" style="flex-wrap:wrap">
          <button class="btn btn-primary" id="btn-save-profile">Salvar alterações</button>
          <span id="save-success" style="display:none;color:var(--green-600);font-size:.875rem">✓ Salvo com sucesso!</span>
        </div>
      </div>

    </main>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<script type="module">
  import { requireAuth, isFederation, isLocalUmp } from '../assets/js/auth.js'
  import { renderShell, canAccessPage } from '../assets/js/router.v2.js'
  import { api } from '../assets/js/api.js'
  import { formatCurrency, showAlert, clearAlert, setLoading } from '../assets/js/utils.js'

  if (!requireAuth()) throw new Error()
  renderShell()
  document.querySelector('[data-page="profile"]')?.classList.add('active')

  const endpoint       = isFederation() ? '/api/federations/me' : '/api/local-umps/me'
  const updateEndpoint = isFederation() ? '/api/federations/me' : '/api/local-umps/me/update'
  const logoEndpoint   = isFederation() ? '/api/federations/me/logo' : '/api/local-umps/me/logo'

  // Mostra campos corretos
  if (isLocalUmp()) {
    document.getElementById('fed-fields').style.display = 'none'
    document.getElementById('local-fields').style.display = 'block'
    document.getElementById('dados-title').textContent = 'Dados da UMP Local'
  }

  async function loadProfile() {
    try {
      const data = await api.get(endpoint)

      // Logo — busca pre-signed URL se tiver logo
      const preview = document.getElementById('logo-preview')
      if (data.logo_url) {
        try {
          const logoEndpointUrl = isFederation() ? '/api/federations/me/logo-url' : '/api/local-umps/me/logo-url'
          const logoData = await api.get(logoEndpointUrl)
          const imgSrc = logoData.base64 || logoData.url
          preview.innerHTML = `<img src="${imgSrc}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-lg)" />`
        } catch {
          preview.textContent = data.name?.charAt(0).toUpperCase() ?? '?'
        }
      } else {
        preview.textContent = data.name?.charAt(0).toUpperCase() ?? '?'
      }

      const themeColor = data.theme_color || '#1a2a6c'
      document.getElementById('org-theme-color').value = themeColor
      updateColorPresets(themeColor)

      if (isFederation()) {
        document.getElementById('org-name').value       = data.name ?? ''
        document.getElementById('org-presbytery').value = data.presbytery_name ?? ''
        document.getElementById('org-synodal').value    = data.synodal_name ?? ''
      } else {
        document.getElementById('local-name').value           = data.name ?? ''
        document.getElementById('local-presbytery').value     = data.presbytery_name ?? ''
        document.getElementById('local-church').value         = data.church_name ?? ''
        document.getElementById('local-address').value        = data.address ?? ''
        document.getElementById('local-pastor').value         = data.pastor_name ?? ''
        document.getElementById('local-pastor-contact').value = data.pastor_contact ?? ''
        document.getElementById('local-org-date').value       = data.organization_date ?? ''
        document.getElementById('local-year').value           = data.fiscal_year ?? ''
        document.getElementById('local-balance').value        = formatCurrency(data.initial_balance)
      }
    } catch(err) {
      showAlert('page-alert', err.message, 'error')
    }
  }

  function updateColorPresets(selectedColor) {
    document.querySelectorAll('.color-preset').forEach(btn => {
      const isSelected = btn.dataset.color.toLowerCase() === selectedColor.toLowerCase()
      btn.style.border = isSelected ? '2px solid var(--slate-800)' : '2px solid transparent'
      btn.style.transform = isSelected ? 'scale(1.15)' : 'scale(1)'
    })
  }

  document.querySelectorAll('.color-preset').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('org-theme-color').value = btn.dataset.color
      updateColorPresets(btn.dataset.color)
    })
  })

  document.getElementById('org-theme-color').addEventListener('input', (e) => {
    updateColorPresets(e.target.value)
  })

  loadProfile()

  // Upload logo
  document.getElementById('logo-input').addEventListener('change', async (e) => {
    const file = e.target.files[0]
    if (!file) return
    const status  = document.getElementById('logo-status')
    const btnText = document.getElementById('logo-btn-text')
    btnText.textContent = 'Enviando...'
    status.style.color = 'var(--slate-500)'
    status.textContent = 'Fazendo upload...'
    try {
      const fd = new FormData()
      fd.append('file', file)
      await api.upload(logoEndpoint, fd)

      // Busca pre-signed URL para exibir
      const logoEndpointUrl = isFederation() ? '/api/federations/me/logo-url' : '/api/local-umps/me/logo-url'
      const logoData = await api.get(logoEndpointUrl)
      const imgSrc = logoData.base64 || logoData.url
      const preview = document.getElementById('logo-preview')
      preview.innerHTML = `<img src="${imgSrc}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-lg)" />`

      status.textContent = '✓ Logo atualizada!'
      status.style.color = 'var(--green-600)'
    } catch(err) {
      status.textContent = err.message
      status.style.color = 'var(--red-600)'
    } finally {
      btnText.textContent = 'Trocar logo'
      e.target.value = ''
    }
  })

  // Salvar perfil
  document.getElementById('btn-save-profile').addEventListener('click', async () => {
    const btn = document.getElementById('btn-save-profile')
    clearAlert('profile-alert')
    setLoading(btn, true, 'Salvar alterações')

    let payload = {}
    if (isFederation()) {
      payload = {
        name:            document.getElementById('org-name').value,
        presbytery_name: document.getElementById('org-presbytery').value,
        synodal_name:    document.getElementById('org-synodal').value,
      }
    } else {
      payload = {
        name:              document.getElementById('local-name').value,
        church_name:       document.getElementById('local-church').value,
        address:           document.getElementById('local-address').value,
        pastor_name:       document.getElementById('local-pastor').value,
        pastor_contact:    document.getElementById('local-pastor-contact').value,
        organization_date: document.getElementById('local-org-date').value || null,
      }
    }
    payload.theme_color = document.getElementById('org-theme-color').value

    try {
      await api.put(updateEndpoint, payload)
      const ok = document.getElementById('save-success')
      ok.style.display = 'inline'
      setTimeout(() => ok.style.display = 'none', 3000)
    } catch(err) {
      showAlert('profile-alert', err.message, 'error')
    } finally {
      setLoading(btn, false, 'Salvar alterações')
    }
  })
</script>

<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(console.error)

  const btnMenu = document.getElementById('btn-menu')
  const sidebar = document.querySelector('.sidebar')
  const overlay = document.getElementById('sidebar-overlay')

  btnMenu?.addEventListener('click', () => {
    sidebar.classList.toggle('open')
    overlay.classList.toggle('open')
  })
  overlay?.addEventListener('click', () => {
    sidebar.classList.remove('open')
    overlay.classList.remove('open')
  })
  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) {
      sidebar.classList.remove('open')
      overlay.classList.remove('open')
    }
  })
</script>

</body>
</html>
