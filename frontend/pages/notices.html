<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache" />
  <meta name="theme-color" content="#1a2a6c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/assets/img/logo.png" />
  <link rel="apple-touch-icon" href="/assets/img/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <title>Avisos — UMP POPB</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/layout.v2.css" />
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="/assets/img/logo.png" class="sidebar-brand-logo" alt="Logo UMP" onerror="this.style.display='none'" />
      <div class="sidebar-brand-text">
        <h1>UMP POPB</h1>
        <p>Plataforma de Gestão</p>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">v1.0.0</div>
  </aside>

  <div class="main-area">
    <header class="header">
      <button class="btn-menu" id="btn-menu">☰</button>
      <div class="header-user">
        <div class="header-user-name" id="header-name"></div>
        <div class="header-user-role" id="header-role"></div>
      </div>
      <div class="header-avatar" id="header-avatar"></div>
      <button class="btn-logout" id="btn-logout" title="Sair">⏻</button>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-header-info">
          <h1>Avisos</h1>
          <p>Comunicados e avisos gerais</p>
        </div>
      </div>

      <div class="card" style="text-align:center;padding:3rem">
        <p style="font-size:2rem;margin-bottom:1rem">📢</p>
        <h2>Em breve</h2>
        <p class="text-slate-500 text-sm mt-2">Módulo de Avisos em desenvolvimento.</p>
      </div>
    </main>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
</div>

<script type="module">
  import { requireAuth } from '../assets/js/auth.js'
  import { renderShell } from '../assets/js/router.v2.js'

  if (!requireAuth()) throw new Error()

  renderShell()
  document.querySelector('[data-page="notices"]')?.classList.add('active')
</script>

<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(console.error)

  const btnMenu = document.getElementById('btn-menu')
  const sidebar = document.querySelector('.sidebar')
  const overlay = document.getElementById('sidebar-overlay')

  btnMenu?.addEventListener('click', () => {
    sidebar.classList.toggle('open')
    overlay.classList.toggle('open')
  })
  overlay?.addEventListener('click', () => {
    sidebar.classList.remove('open')
    overlay.classList.remove('open')
  })
  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) {
      sidebar.classList.remove('open')
      overlay.classList.remove('open')
    }
  })
</script>

</body>
</html>
