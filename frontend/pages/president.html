<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2a6c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="UMP POPB" />
  <meta name="application-name" content="UMP POPB" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/assets/img/logo.png" />
  <link rel="apple-touch-icon" href="/assets/img/192-maskable.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/assets/img/512-maskable.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <title>Presidência — UMP POPB</title>
  <link rel="stylesheet" href="../assets/css/main.css?v=9" />
  <link rel="stylesheet" href="../assets/css/components.css?v=9" />
  <link rel="stylesheet" href="../assets/css/layout.v2.css?v=9" />
  <style>
    .pres-tab {
      padding: .45rem 1rem;
      border: none;
      background: none;
      font-size: .875rem;
      font-weight: 500;
      color: var(--slate-500);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-family: inherit;
      transition: all .15s;
      white-space: nowrap;
    }
    .pres-tab.active {
      color: var(--brand-blue, #1a2a6c);
      border-bottom-color: var(--brand-blue, #1a2a6c);
    }
    .loading-center { display:flex;justify-content:center;padding:2rem; }
  </style>
  <style>
    .sig-card {
      background: #fff;
      border: 1px solid var(--slate-200);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }
    .sig-card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .sig-card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--slate-800);
    }
    .sig-card-meta {
      font-size: .8rem;
      color: var(--slate-500);
    }
    .sig-card-actions {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      margin-top: .25rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: .2rem .7rem;
      border-radius: 99px;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .badge-pending     { background: #fef9c3; color: #a16207; }
    .badge-approved    { background: #dcfce7; color: #16a34a; }
    .badge-rejected    { background: #fee2e2; color: #dc2626; }
    .badge-invalidated { background: #f1f5f9; color: #64748b; }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--slate-400);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .empty-state p { font-size: .9rem; }

    .section-title {
      font-size: .95rem;
      font-weight: 700;
      color: var(--slate-700);
      margin-bottom: .75rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .section-divider { margin: 1.5rem 0; border: none; border-top: 1px solid var(--slate-200); }

    .spinner-inline {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="/assets/img/logo.png" class="sidebar-brand-logo" alt="Logo UMP" onerror="this.style.display='none'" />
      <div class="sidebar-brand-text">
        <h1>UMP POPB</h1>
        <p>Plataforma de Gestão</p>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">v1.0.0</div>
  </aside>

  <div class="main-area">
    <header class="header">
      <div class="header-left">
        <button class="btn-menu" id="btn-menu">☰</button>
        <div class="header-org">
          <span class="header-org-name" id="header-org-name"></span>
        </div>
      </div>
      <div class="header-right">
        <div class="header-user">
          <div class="header-user-name" id="header-name"></div>
          <div class="header-user-role" id="header-role"></div>
        </div>
        <div class="header-avatar" id="header-avatar"></div>
        <button class="btn-logout" id="btn-logout" title="Sair"><img src="/assets/img/sair.png" alt="Sair" style="width:20px;height:20px;display:block" /></button>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-header-info">
          <h1>Presidência</h1>
          <p>Painel exclusivo da presidência</p>
        </div>
      </div>

      <div id="page-alert" style="margin-bottom:.75rem"></div>

      <!-- Tabs -->
      <div style="display:flex;gap:.5rem;border-bottom:2px solid var(--slate-100);margin-bottom:1.25rem;overflow-x:auto">
        <button class="pres-tab active" data-tab="financeiro" onclick="switchTab('financeiro')">💰 Financeiro</button>
        <button class="pres-tab" data-tab="outros" onclick="switchTab('outros')">📋 Outros</button>
      </div>

      <!-- ABA FINANCEIRO -->
      <div id="tab-financeiro">
        <div style="margin-bottom:1.5rem">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
            <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--slate-400)">Aguardando Sua Aprovação</div>
            <button class="btn btn-ghost btn-sm" id="btn-refresh-pending">↺ Atualizar</button>
          </div>
          <div id="pending-list">
            <div class="loading-center"><div class="spinner"></div></div>
          </div>
        </div>

        <div>
          <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--slate-400);margin-bottom:.75rem">Histórico de Relatórios</div>
          <div id="history-list">
            <div class="loading-center"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- ABA OUTROS -->
      <div id="tab-outros" style="display:none">
        <div class="card" style="text-align:center;padding:2.5rem">
          <p style="font-size:1.8rem;margin-bottom:.5rem">📋</p>
          <p class="font-semi text-slate-700">Em breve</p>
          <p class="text-sm text-slate-400 mt-1">Outros tipos de relatórios e aprovações em desenvolvimento.</p>
        </div>
      </div>
    </main>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
</div>

<script type="module">
  import { requireAuth } from '../assets/js/auth.js'
  import { renderShell, renderBottomNav } from '../assets/js/router.v3.js'
  import { api } from '../assets/js/api.js'
  import { formatDate, showAlert, clearAlert, setLoading } from '../assets/js/utils.js'

  if (!requireAuth()) throw new Error()
  await renderShell()
  renderBottomNav('president')
  document.querySelector('[data-page="president"]')?.classList.add('active')

  function fmtDate(dt) {
    if (!dt) return '—'
    try {
      return new Date(dt).toLocaleDateString('pt-BR', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      })
    } catch { return dt }
  }

  function badgeHtml(status) {
    const map = {
      pending:     ['badge-pending',     '⏳ Pendente'],
      approved:    ['badge-approved',    '✅ Aprovado'],
      rejected:    ['badge-rejected',    '❌ Rejeitado'],
      invalidated: ['badge-invalidated', '🔒 Invalidado'],
    }
    const [cls, label] = map[status] || ['badge-pending', status]
    return `<span class="badge ${cls}">${label}</span>`
  }

  window.switchTab = (tab) => {
    document.querySelectorAll('.pres-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab))
    document.getElementById('tab-financeiro').style.display = tab === 'financeiro' ? 'block' : 'none'
    document.getElementById('tab-outros').style.display = tab === 'outros' ? 'block' : 'none'
  }

  function formatCurrency(v) {
    try {
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0)
    } catch { return 'R$ 0,00' }
  }

  async function loadPending() {
    clearAlert('page-alert')
    document.getElementById('pending-list').innerHTML =
      '<div class="loading-center"><div class="spinner"></div></div>'
    try {
      const data = await api.get('/api/finances/periods-ready')
      const list = document.getElementById('pending-list')

      if (!data.length) {
        list.innerHTML = `
          <div style="background:var(--slate-50);border:1.5px dashed var(--slate-200);border-radius:var(--radius-lg);padding:2rem;text-align:center;color:var(--slate-400);font-size:.875rem">
            <div style="font-size:1.8rem;margin-bottom:.5rem">📭</div>
            Nenhum período aguardando encerramento.
          </div>`
        return
      }

      list.innerHTML = data.map(p => `
        <div class="card" style="border-left:4px solid var(--brand-orange,#e8630a);margin-bottom:.75rem">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap">
            <div>
              <div style="font-weight:700;font-size:.95rem;margin-bottom:.25rem">Período Financeiro ${p.fiscal_year}</div>
              <div style="font-size:.78rem;color:var(--slate-500)">Marcado como pronto em ${formatDate(p.ready_at?.split('T')[0])}</div>
              <div style="margin-top:.5rem"><span class="badge badge-pending">📋 Aguardando encerramento</span></div>
            </div>
            <div style="display:flex;gap:.5rem;flex-shrink:0">
              <button class="btn btn-sm"
                style="background:linear-gradient(135deg,#1a5c2a,#2d8a40);color:#fff"
                onclick="closePeriod('${p.id}', ${p.fiscal_year})">
                🔒 Encerrar Período
              </button>
            </div>
          </div>
          <div style="margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--slate-100);display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.5rem">
            <div style="background:var(--slate-50);border-radius:var(--radius);padding:.5rem .75rem;text-align:center">
              <div style="font-size:.65rem;color:var(--slate-400)">Saldo Inicial</div>
              <div style="font-size:.85rem;font-weight:600">${formatCurrency(p.initial_balance)}</div>
            </div>
            <div style="background:#f0fdf4;border-radius:var(--radius);padding:.5rem .75rem;text-align:center">
              <div style="font-size:.65rem;color:var(--slate-400)">Receitas</div>
              <div style="font-size:.85rem;font-weight:600;color:var(--green-600)">${formatCurrency(p.total_in)}</div>
            </div>
            <div style="background:#fef2f2;border-radius:var(--radius);padding:.5rem .75rem;text-align:center">
              <div style="font-size:.65rem;color:var(--slate-400)">Despesas</div>
              <div style="font-size:.85rem;font-weight:600;color:var(--red-600)">${formatCurrency(p.total_out)}</div>
            </div>
            <div style="background:#eff6ff;border-radius:var(--radius);padding:.5rem .75rem;text-align:center">
              <div style="font-size:.65rem;color:var(--slate-400)">Saldo Final</div>
              <div style="font-size:.85rem;font-weight:600;color:var(--blue-600)">${formatCurrency(p.final_balance)}</div>
            </div>
          </div>
        </div>
      `).join('')
    } catch(err) {
      document.getElementById('pending-list').innerHTML =
        `<div class="alert alert-error">${err.message}</div>`
    }
  }

  async function loadHistory() {
    const el = document.getElementById('history-list')
    el.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>'
    try {
      const periods = await api.get('/api/finances/periods')
      const closed = periods.filter(p => p.is_closed)
      if (!closed.length) {
        el.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Nenhum período encerrado ainda.</p></div>'
        return
      }
      el.innerHTML = closed.map(p => `
        <div class="sig-card" style="margin-bottom:.75rem">
          <div class="sig-card-row">
            <div class="sig-card-title">Período Financeiro ${p.fiscal_year}</div>
            <span class="badge badge-approved">✅ Encerrado</span>
          </div>
          <div class="sig-card-meta">Encerrado em ${fmtDate(p.closed_at)}</div>
          ${p.report_url || p.receipts_report_url ? `
          <div class="sig-card-actions">
            <button class="btn btn-ghost btn-sm btn-download-period" data-id="${p.id}">📥 Ver Relatórios</button>
          </div>` : ''}
        </div>
      `).join('')
    } catch(err) {
      el.innerHTML = `<div class="alert alert-error">${err.message}</div>`
    }
  }

  document.getElementById('history-list').addEventListener('click', async e => {
    const dlBtn = e.target.closest('.btn-download-period')
    if (!dlBtn) return
    const periodId = dlBtn.dataset.id
    setLoading(dlBtn, true, '📥 Ver Relatórios')
    try {
      const data = await api.get(`/api/finances/periods/${periodId}/report-urls`)
      if (data.report_url) window.open(data.report_url, '_blank')
      if (data.receipts_report_url) window.open(data.receipts_report_url, '_blank')
    } catch(err) {
      showAlert('page-alert', 'Erro ao obter relatórios: ' + (err.message || 'Tente novamente.'), 'error')
    } finally {
      setLoading(dlBtn, false, '📥 Ver Relatórios')
    }
  })

  window.closePeriod = async (periodId, year) => {
    if (!confirm(
      `Encerrar definitivamente o período ${year}?\n\n` +
      `✓ Relatório financeiro assinado digitalmente\n` +
      `✓ Relatório de comprovantes gerado\n` +
      `✓ Período bloqueado permanentemente\n\n` +
      `Esta ação é irreversível.`
    )) return

    document.getElementById('pending-list').innerHTML =
      '<div class="loading-center"><div class="spinner"></div></div><p style="text-align:center;color:var(--slate-500);margin-top:.5rem;font-size:.875rem">⏳ Gerando relatórios assinados... Aguarde.</p>'

    try {
      await api.post(`/api/finances/periods/${periodId}/close`)
      showAlert('page-alert', '✅ Período encerrado! Relatórios assinados gerados com sucesso.', 'success')
      await loadPending()
      await loadHistory()
    } catch(err) {
      showAlert('page-alert', err.message, 'error')
      await loadPending()
    }
  }

  document.getElementById('btn-refresh-pending').addEventListener('click', () => {
    loadPending()
    loadHistory()
  })

  loadPending()
  loadHistory()
</script>

<script>
  if ('serviceWorker' in navigator) {
    // Remove todos os SWs antigos primeiro
    navigator.serviceWorker.getRegistrations().then(regs => {
      return Promise.all(regs.map(r => r.unregister()))
    }).then(() => {
      return navigator.serviceWorker.register('/sw.js?v=8')
    }).then(reg => {
      console.log('SW registrado:', reg.scope)
    }).catch(err => console.error('SW erro:', err))
  }
</script>

</body>
</html>
