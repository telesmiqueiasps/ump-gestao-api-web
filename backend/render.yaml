services:
  - type: web
    name: ump-gestao-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: B2_KEY_ID
        sync: false
      - key: B2_APPLICATION_KEY
        sync: false
      - key: B2_BUCKET_NAME
        sync: false
      - key: B2_ENDPOINT_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_FEDERATION_ID
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false

  - type: cron
    name: ump-push-reminders
    env: python
    schedule: "0 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: >
      python -c "
      import requests;
      r = requests.post(
        'https://ump-gestao-api.onrender.com/api/push/send-reminders',
        timeout=30
      );
      print(r.status_code, r.text)
      "