<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2a6c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="UMP POPB" />
  <meta name="application-name" content="UMP POPB" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/assets/img/logo.png" />
  <link rel="apple-touch-icon" href="/assets/img/192-maskable.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/assets/img/512-maskable.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <title>Secretaria — UMP POPB</title>
  <link rel="stylesheet" href="../assets/css/main.css?v=8" />
  <link rel="stylesheet" href="../assets/css/components.css?v=8" />
  <link rel="stylesheet" href="../assets/css/layout.v2.css?v=8" />
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="/assets/img/logo.png" class="sidebar-brand-logo" alt="Logo UMP" onerror="this.style.display='none'" />
      <div class="sidebar-brand-text">
        <h1>UMP POPB</h1>
        <p>Plataforma de Gestão</p>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">v1.0.0</div>
  </aside>

  <div class="main-area">
    <header class="header">
      <div class="header-left">
        <button class="btn-menu" id="btn-menu">☰</button>
        <div class="header-org">
          <span class="header-org-name" id="header-org-name"></span>
        </div>
      </div>
      <div class="header-right">
        <div class="header-user">
          <div class="header-user-name" id="header-name"></div>
          <div class="header-user-role" id="header-role"></div>
        </div>
        <div class="header-avatar" id="header-avatar"></div>
        <button class="btn-logout" id="btn-logout" title="Sair">⏻</button>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-header-info">
          <h1>Secretaria</h1>
          <p>Gestão de documentos e atas</p>
        </div>
      </div>

      <div class="card" style="text-align:center;padding:3rem">
        <p style="font-size:2rem;margin-bottom:1rem">📋</p>
        <h2>Em breve</h2>
        <p class="text-slate-500 text-sm mt-2">Módulo de Secretaria em desenvolvimento.</p>
      </div>
    </main>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
</div>

<script type="module">
  import { requireAuth } from '../assets/js/auth.js'
  import { renderShell, renderBottomNav } from '../assets/js/router.v3.js'

  if (!requireAuth()) throw new Error()

  renderShell()
  renderBottomNav('secretary')
  document.querySelector('[data-page="secretary"]')?.classList.add('active')
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            newWorker.postMessage('skipWaiting')
            window.location.reload()
          }
        })
      })
    }).catch(console.error)
  }

  const btnMenu = document.getElementById('btn-menu')
  const sidebar = document.querySelector('.sidebar')
  const overlay = document.getElementById('sidebar-overlay')

  btnMenu?.addEventListener('click', () => {
    sidebar.classList.toggle('open')
    overlay.classList.toggle('open')
  })
  overlay?.addEventListener('click', () => {
    sidebar.classList.remove('open')
    overlay.classList.remove('open')
  })
  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) {
      sidebar.classList.remove('open')
      overlay.classList.remove('open')
    }
  })
</script>

</body>
</html>
