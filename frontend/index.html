<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache" />
  <meta name="theme-color" content="#1a2a6c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/assets/img/logo.png" />
  <link rel="apple-touch-icon" href="/assets/img/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <title>UMP POPB — Login</title>
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
</head>
<body>

<div class="login-page">
  <div>
    <div class="login-card">
      <div class="login-card-top">
        <img src="/assets/img/logo.png" class="login-logo" alt="Logo UMP POPB" onerror="this.style.display='none'" />
        <h1>UMP POPB</h1>
        <p>Plataforma de Gestão</p>
      </div>
      <div class="login-card-body">
        <h2>Entrar na plataforma</h2>

        <div class="field mb-4">
          <label for="email">E-mail</label>
          <input class="input" type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
        </div>

        <div class="field mb-4">
          <label for="password">Senha</label>
          <input class="input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <div id="login-alert" class="hidden mb-4"></div>

        <button class="btn btn-primary w-full" id="btn-login" style="justify-content:center">
          Entrar
        </button>
      </div>
    </div>

    <p class="login-footer">Plataforma de Gestão UMP © <span id="year"></span></p>
    <p class="login-credit">Desenvolvido por Miquéias Teles</p>
  </div>
</div>

<!-- PWA Install Banner -->
<div class="pwa-banner hidden" id="pwa-banner">
  <img src="/assets/img/logo.png" class="pwa-banner-logo" alt="Logo" onerror="this.style.display='none'" />
  <div class="pwa-banner-text">
    <strong>Instalar UMP POPB</strong>
    <span>Adicione à tela inicial do seu celular</span>
  </div>
  <div class="pwa-banner-actions">
    <button class="btn btn-primary btn-sm" id="btn-install">Instalar</button>
    <button class="btn btn-ghost btn-sm" id="btn-dismiss">Agora não</button>
  </div>
</div>

<script type="module">
  import { login, isLoggedIn } from './assets/js/auth.js'
  import { showAlert, setLoading } from './assets/js/utils.js'

  // Se já estiver logado, redireciona
  if (isLoggedIn()) window.location.href = '/pages/dashboard.html'

  document.getElementById('year').textContent = new Date().getFullYear()

  const btnLogin = document.getElementById('btn-login')
  const emailEl  = document.getElementById('email')
  const passEl   = document.getElementById('password')

  async function doLogin() {
    const email    = emailEl.value.trim()
    const password = passEl.value

    if (!email || !password) {
      showAlert('login-alert', 'Preencha e-mail e senha.', 'error')
      return
    }

    setLoading(btnLogin, true, 'Entrar')
    try {
      await login(email, password)
      window.location.href = '/pages/dashboard.html'
    } catch (err) {
      showAlert('login-alert', err.message || 'E-mail ou senha incorretos.', 'error')
    } finally {
      setLoading(btnLogin, false, 'Entrar')
    }
  }

  btnLogin.addEventListener('click', doLogin)
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() })

  // Registra Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(console.error)
  }

  // PWA Install prompt
  let deferredPrompt = null
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault()
    deferredPrompt = e
    const dismissed = localStorage.getItem('pwa-dismissed')
    if (!dismissed) {
      setTimeout(() => document.getElementById('pwa-banner').classList.remove('hidden'), 2000)
    }
  })

  document.getElementById('btn-install')?.addEventListener('click', async () => {
    if (!deferredPrompt) return
    deferredPrompt.prompt()
    const { outcome } = await deferredPrompt.userChoice
    deferredPrompt = null
    document.getElementById('pwa-banner').classList.add('hidden')
  })

  document.getElementById('btn-dismiss')?.addEventListener('click', () => {
    localStorage.setItem('pwa-dismissed', '1')
    document.getElementById('pwa-banner').classList.add('hidden')
  })
</script>

</body>
</html>
